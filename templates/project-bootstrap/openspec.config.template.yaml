schema: spec-driven

context: |
  本仓库采用 SDD（Spec-Driven Development，规格驱动开发）方式，并使用前后端分离架构。

  项目名称：<project-name>

  仓库目录约定：
  - 前端根目录：<frontend-root>
  - 后端根目录：<backend-root>
  - 前端业务代码推荐按 `<frontend-root>/src/modules/<module>/pages|components|services|hooks|types` 组织，跨模块复用代码放在 `<frontend-root>/src/shared`

  技术栈：
  - 前端：<frontend-stack>
  - 后端：<backend-stack>
  - API 风格：REST

  后端包结构约定：
  - 根包名：<base-package>
  - 常用子包：controller、config、service、dto、mapper、util、entity、exception、common

  架构指导原则：
  - 以前后端解耦为目标，通过清晰的 REST 契约进行协作。
  - 优先选择主流、稳定、成熟的框架与库。
  - API 命名应以资源为中心，并在不同模块之间保持一致。
  - 功能开发前，应先通过 OpenSpec 产物对齐需求、设计和任务。
  - 涉及前后端请求链路时，应明确 TraceNo、请求/响应日志、异常日志与关键逻辑日志策略，且 TraceNo 使用 32 位无连字符 UUID 格式。
  - 后端测试设计不得长期只停留在 controller 层；存在明确业务规则、状态流转、唯一性校验、导入导出处理、事务边界或定时任务行为时，必须补充 service 层直接测试。
  - 后端 controller 测试应聚焦 REST 契约、鉴权/鉴权失败、参数校验、HTTP 状态码、响应结构与 TraceNo；service 测试应聚焦业务规则、状态流转、持久化副作用、异常分支与关键幂等行为；mapper/custom SQL 测试应聚焦查询条件、聚合统计、软删除过滤与唯一性约束；config 测试应聚焦拦截器、异常映射、日志与通用基础设施行为。
  - 后端的功能开发、缺陷修复与重构默认强制优先采用 TDD。
  - 前端仅对有业务逻辑的代码强制优先采用 TDD；纯样式、静态页面排版、资源替换和脚手架配置调整默认不强制使用 TDD。

rules:
  proposal:
    - proposal 内容默认使用中文编写；如需保留英文术语，应以中文说明为主。
    - 必须明确说明本次变更影响前端、后端，或同时影响两者。
    - 涉及接口时，需写明受影响的 REST 端点、请求/响应 DTO，以及数据库影响。
    - 提案内容需符合前后端分离原则，避免混淆 UI 职责与服务端职责。
    - 涉及前端结构时，需说明是否落在 `modules/` 还是 `shared/`，避免根目录平铺业务文件。
  specs:
    - spec 内容默认使用中文编写；如需保留英文术语，应以中文说明为主。
    - 需求应从用户可见行为或系统能力角度描述。
    - 适用时需覆盖前端行为、后端处理逻辑与 API 契约相关场景。
    - 描述归属时应显式使用具体的前端目录名与后端目录名。
  design:
    - design 内容默认使用中文编写；如需保留英文术语，应以中文说明为主。
    - 设计文档需明确前后端交互边界与 REST API 契约。
    - 需说明后端代码在根包名下的放置方式，以及子包职责划分。
    - 涉及持久化变更时，需说明持久层接口设计与数据库表结构调整。
    - 涉及接口日志或鉴权链路时，需说明 TraceNo 透传、日志脱敏、日志输出约束以及通用复用边界。
    - 涉及实现策略时，需明确本次变更是否适用 TDD，以及适用范围属于后端、前端业务逻辑或前端非 TDD 豁免项。
    - 涉及后端测试策略时，需明确 controller、service、mapper/custom SQL、config 各层测试范围；若存在明确业务规则、状态流转、唯一性校验、导入导出、事务边界或定时任务行为，必须说明对应的 service 层直接测试方案。
  tasks:
    - tasks 内容默认使用中文编写；如需保留英文术语，应以中文说明为主。
    - 当变更同时影响前后端时，任务必须按前端与后端拆分。
    - 后端变更适用时，应包含 API 契约、DTO、持久层映射和数据库相关任务。
    - 任务中应包含前端行为、后端逻辑和联调验证项。
    - 与前端联调时，后端必须使用测试配置进行验证，避免联调任务默认连接生产式或常规业务库配置。
    - 涉及日志能力时，应包含 TraceNo、日志脱敏和日志验证任务。
    - 涉及前端页面或布局时，应包含目录结构、样式接入与验证任务。
    - 涉及后端或前端业务逻辑时，应显式包含先写失败测试再实现的任务；若属于前端非 TDD 豁免项，也应在任务中注明验证方式。
    - 涉及后端测试任务时，不得只列 controller 测试；应按 controller、service、mapper/custom SQL、config 的实际影响补充任务。凡是存在明确业务规则、状态流转、唯一性校验、导入导出、事务边界或定时任务行为的后端改动，必须显式包含 service 层直接测试任务。
