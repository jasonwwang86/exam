schema: spec-driven

context: |
  本仓库采用 SDD（Spec-Driven Development，规格驱动开发）方式，并使用前后端分离架构。

  项目名称：exam

  仓库目录约定：
  - 前端根目录：exam-web
  - 后端根目录：exam-service
  - 前端业务代码推荐按 `exam-web/src/modules/<module>/pages|components|services|hooks|types` 组织，跨模块复用代码放在 `exam-web/src/shared`

  技术栈：
  - 前端：React + TypeScript + Vite + React Router + Axios + Ant Design
  - 后端：Java + MyBatis-Plus + MySQL + Spring Boot + Spring MVC + Spring Validation + Maven + Lombok
  - API 风格：REST

  后端包结构约定：
  - 根包名：cn.jack.exam
  - 常用子包：controller、config、service、dto、mapper、util、entity、exception、common

  架构指导原则：
  - 以前后端解耦为目标，通过清晰的 REST 契约进行协作。
  - 优先选择主流、稳定、成熟的框架与库。
  - API 命名应以资源为中心，并在不同模块之间保持一致。
  - 功能开发前，应先通过 OpenSpec 产物对齐需求、设计和任务。
  - 涉及前后端请求链路时，应明确 TraceNo、请求/响应日志、异常日志与关键逻辑日志策略，且 TraceNo 使用 32 位无连字符 UUID 格式。
  - `exam-service` 的功能开发、缺陷修复与重构默认强制优先采用 TDD。
  - `exam-web` 仅对有业务逻辑的前端代码强制优先采用 TDD；纯样式、静态页面排版、资源替换和脚手架配置调整默认不强制使用 TDD。

rules:
  proposal:
    - proposal 内容默认使用中文编写；如需保留英文术语，应以中文说明为主。
    - 必须明确说明本次变更影响 `exam-web`、`exam-service`，或同时影响两者。
    - 涉及接口时，需写明受影响的 REST 端点、请求/响应 DTO，以及数据库影响。
    - 提案内容需符合前后端分离原则，避免混淆 UI 职责与服务端职责。
    - 涉及前端结构时，需说明是否落在 `modules/` 还是 `shared/`，避免根目录平铺业务文件。
  specs:
    - spec 内容默认使用中文编写；如需保留英文术语，应以中文说明为主。
    - 需求应从用户可见行为或系统能力角度描述。
    - 适用时需覆盖前端行为、后端处理逻辑与 API 契约相关场景。
    - 描述归属时应显式使用 `exam-web` 与 `exam-service` 这两个目录名。
  design:
    - design 内容默认使用中文编写；如需保留英文术语，应以中文说明为主。
    - 设计文档需明确前后端交互边界与 REST API 契约。
    - 需说明后端代码在 `cn.jack.exam` 包下的放置方式，以及子包职责划分。
    - 涉及持久化变更时，需说明 MyBatis-Plus Mapper 设计与 MySQL 表结构调整。
    - 涉及接口日志或鉴权链路时，需说明 TraceNo 透传、日志脱敏、日志输出约束以及通用复用边界。
    - 涉及实现策略时，需明确本次变更是否适用 TDD，以及适用范围属于 `exam-service`、`exam-web` 业务逻辑或 `exam-web` 非 TDD 豁免项。
  tasks:
    - tasks 内容默认使用中文编写；如需保留英文术语，应以中文说明为主。
    - 当变更同时影响前后端时，任务必须按 `exam-web` 与 `exam-service` 拆分。
    - 后端变更适用时，应包含 API 契约、DTO、Mapper 和数据库相关任务。
    - 任务中应包含前端行为、后端逻辑和联调验证项。
    - 涉及日志能力时，应包含 TraceNo、日志脱敏和日志验证任务。
    - 涉及前端页面或布局时，应包含目录结构、样式接入与验证任务。
    - 涉及 `exam-service` 或 `exam-web` 业务逻辑时，应显式包含先写失败测试再实现的任务；若属于 `exam-web` 的非 TDD 豁免项，也应在任务中注明验证方式。
